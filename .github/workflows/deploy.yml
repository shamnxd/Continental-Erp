name: Build and Deploy to VPS

on:
  push:
    branches:
      - main
      - fix/general-fixes # Add your default/deployment branch here

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 1. Build and Push Backend Server
      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/contproj-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Build and Push Admin Frontend
      - name: Build & Push Admin
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: ${{ secrets.DOCKER_USERNAME }}/contproj-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. Build and Push Staff Frontend
      - name: Build & Push Staff
        uses: docker/build-push-action@v6
        with:
          context: ./staff
          file: ./staff/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: ${{ secrets.DOCKER_USERNAME }}/contproj-staff:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 4. Build and Push Client Frontend
      - name: Build & Push Client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: ${{ secrets.DOCKER_USERNAME }}/contproj-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS via SSH
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /www/server/panel/data/compose/b6463d1afcc11be500b3dfa0d2d35314/
            docker compose pull
            docker compose up -d --remove-orphans
