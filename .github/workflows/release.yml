name: Build and Release Multi-Portal Suite

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.2)

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build Desktop for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ----------------------------------------------------
      # 1. Build Tally Sync Agent (Windows Only)
      # ----------------------------------------------------
      - name: Install & Package Tally Agent (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd tally-agent
          npm install
          npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # ----------------------------------------------------
      # 2. Build Admin Portal (Windows & macOS)
      # ----------------------------------------------------
      - name: Install & Package Admin Portal
        run: |
          cd admin
          npm install
          npm run build
          npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # ----------------------------------------------------
      # 3. Build Staff Portal Desktop (Windows & macOS)
      # ----------------------------------------------------
      - name: Install & Package Staff Desktop
        run: |
          cd staff
          npm install
          npm run build
          npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # ----------------------------------------------------
      # 4. Upload Desktop Artifacts to Release
      # ----------------------------------------------------
      - name: Upload Desktop Packages to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tally-agent/dist/*.exe
            admin/dist/*.exe
            admin/dist/*.dmg
            staff/dist/*.exe
            staff/dist/*.dmg
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Build Web Application
      - name: Build Web Code
        run: |
          cd staff
          npm install
          npm run build

      # Sync and Compile Android
      - name: Build Android Debug APK
        run: |
          cd staff
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # Upload Android APK to Release
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: staff/android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
